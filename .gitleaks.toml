# Gitleaks configuration (HARD-09). Extends the built-in default ruleset.
#
# Allowlist policy: entries must be NARROW (a named file, not a directory glob
# wildcard-ing the whole tree) and each must say WHY the match is not a secret.
# A new fake credential in a new test file is EXPECTED to trip the scan — the
# author either uses an obviously-fake value or consciously extends this list.

title = "forge gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Reviewed non-secrets (HARD-09 baseline, 2026-07-04)"
paths = [
  # Fake secrets deliberately embedded to exercise the redaction layer.
  '''packages/observability/tests/test_tracing\.py''',
  '''packages/observability/tests/test_telemetry_logging\.py''',
  '''packages/auth-sdk/tests/test_redaction\.py''',
  '''packages/knowledge-core/tests/test_mcp_redaction\.py''',
  # HARD-03: fake jina-/cohere-secret shapes exercising the reranker redactor
  # (GracefulReranker / JinaRerankerClient) — no real credential.
  '''packages/knowledge-core/tests/test_reranker\.py''',
  '''packages/knowledge-core/tests/test_reranker_live\.py''',
  '''packages/mcp-sdk/forge_mcp/testing\.py''',
  '''apps/api/tests/test_obs_redaction\.py''',
  # HARD-02: fake sk-…/Bearer… shapes that exercise the model-client redactor.
  '''packages/agent-runtime/tests/test_providers_redaction\.py''',
  # Fake RFC example RSA key + AWS example key (AKIA…EXAMPLE) seeding the
  # secret-exclusion/redaction corpus assertions (_FAKE_PEM / _FAKE_AWS_KEY).
  '''packages/evaluation/tests/test_corpus_eval\.py''',
  '''apps/api/tests/test_obs_otel\.py''',
  '''apps/api/tests/test_obs_router\.py''',
  '''apps/api/tests/test_obs_audit\.py''',
  '''tests/security/fixtures/.*''',
  # Enforcement-matrix redaction samples (canonical FAKE shapes: sk-…, AKIA…EXAMPLE).
  '''tests/security/matrix_checks\.py''',
  # Integration ENV TEMPLATE — key names only, all values empty. "Never commit values."
  '''\.env\.integration\.example''',
  # Spec/docs prose that pattern-matches generic-api-key (no real values).
  '''docs/implementation-slices/.*\.md''',
  # Documented DEV-ONLY compose defaults (header says NOT for production);
  # committed so `docker compose -f deploy/docker-compose.dev.yml up` works
  # with zero setup. Waiver W-005 in security/waivers.yaml.
  '''deploy/\.env\.dev''',
]
