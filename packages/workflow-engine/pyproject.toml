[project]
name = "forge-workflow"
version = "0.1.0"
description = "Postgres-backed FSM workflow engine and DSL parser for Forge."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "forge-db",
    "sqlalchemy>=2.0",
    "pyyaml>=6.0",
    # F25 — Temporal durable workflow engine (V2). Pinned exactly: the Workflow
    # Update API + time-skipping WorkflowEnvironment are version-sensitive.
    "temporalio==1.29.0",
    # F25 — RedactingEncryptionCodec AES-GCM encryption of Temporal payloads.
    "cryptography>=43",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_workflow"]
artifacts = ["forge_workflow/definitions/*.yaml"]

[tool.hatch.build.targets.wheel.force-include]
"forge_workflow/definitions" = "forge_workflow/definitions"
