[project]
name = "forge-approval"
version = "0.1.0"
description = "Human Approval System SDK — the canonical approval-gate primitive: one gate table/service, six gate types, one server-side authorization policy, provider/hook registry, deploy + policy-override gates, single-use override grants."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "pydantic>=2.7",
]

[tool.uv.sources]
forge-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_approval"]
