[project]
name = "forge-contracts"
version = "0.1.0"
description = "Frozen Pydantic DTOs and Protocol interfaces shared across all Forge packages."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "pydantic>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_contracts"]
