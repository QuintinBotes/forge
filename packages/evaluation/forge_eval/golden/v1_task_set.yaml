      - { id: KNOW-004-R2, text: "Vector search returns nearest by cosine" }
      - { id: KNOW-004-R3, text: "Secrets redacted from results", difficulty: stretch }
    expected_status: done
    expected_checks: [lint, types, tests]
    tags: [knowledge, store]

  - id: KNOW-005
