# Forge V1 golden task set (plan Task 1.16).
#
# >=30 representative engineering-task inputs paired with their known-good
# outputs. Built per spec (Observability and Evaluation) and the LangGraph 2026
# production guidance the spec cites: the golden set exists before framework
# complexity is added, and every release is scored against it so regressions
# block merge (forge_eval.harness.TaskScorecard.assert_threshold).
#
# Each task declares:
#   - objective         human task statement
#   - kind              a forge_contracts.TaskKind value
#   - skill_profile     the skill profile a correct run should use (optional)
#   - requirements      ground-truth requirements; difficulty core|stretch
#   - expected_status   terminal task status of a known-good run
#   - expected_checks   verification checks a known-good run must pass
#   - expected_chunks   retrieval chunks a correct run should surface (optional)
#
# Loaded through forge_eval.tasks.load_golden_tasks, scored by
# forge_eval.harness.evaluate_tasks. The reference baseline solver
# (forge_eval.harness.reference_solver) solves every `core` requirement but no
# `stretch` requirement, so stretch goals genuinely differentiate pipelines.
tasks:
  # ---------------------------------------------------------------- knowledge --
  - id: KNOW-001
    objective: "Chunk a Python module into function/class-level chunks via AST."
    kind: feature
    skill_profile: backend-tdd
    requirements:
      - { id: KNOW-001-R1, text: "One chunk per top-level def/class" }
      - { id: KNOW-001-R2, text: "Correct start/end line spans" }
      - { id: KNOW-001-R3, text: "Falls back to ast when tree-sitter absent" }
    expected_status: done
    expected_checks: [lint, types, tests]
    tags: [knowledge, chunking]

  - id: KNOW-002
    objective: "Chunk Markdown semantically on headings and paragraphs."
    kind: feature
    skill_profile: backend-tdd
    requirements:
      - { id: KNOW-002-R1, text: "Split on heading boundaries" }
      - { id: KNOW-002-R2, text: "Preserve paragraph integrity" }
    expected_status: done
