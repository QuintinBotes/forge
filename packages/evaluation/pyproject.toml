[project]
name = "forge-eval"
version = "0.1.0"
description = "Golden task set, retrieval metrics, and quality evaluation harness."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    # The golden retrieval eval (Task 1.4) scores the real hybrid pipeline.
    "forge-knowledge",
    "forge-db",
    # HARD-12: the release-readiness engine reads release/gates.yaml + attestations.
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# The learned local embedder for the honest real-corpus eval (HARD-04). Optional
# so the base package and default test suite never require torch. uv lock owned
# by HARD-14.
eval = ["sentence-transformers>=3.0"]

[project.scripts]
# HARD-12: the automated RELEASE_READINESS meta-gate. Runs/inspects every spec
# gate and renders RELEASE_READINESS.md with a CI-grade exit code.
forge-release-readiness = "forge_eval.release.readiness:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_eval"]
