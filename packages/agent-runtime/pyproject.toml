[project]
name = "forge-agent"
version = "0.1.0"
description = "LangGraph single-agent execution loop, tool registry, and sandboxes (worktree + container)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "langgraph>=1.2.7,<2",
    "docker>=7.1,<8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_agent"]
