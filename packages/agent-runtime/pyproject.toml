[project]
name = "forge-agent"
version = "0.1.0"
description = "LangGraph single-agent execution loop, tool registry, and worktree sandbox."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_agent"]
