[project]
name = "forge-agent"
version = "0.1.0"
description = "LangGraph single-agent execution loop, tool registry, and sandboxes (worktree + container)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "forge-orchestration-policy",
    "langgraph>=1.2,<2",
    "docker>=7.1,<8",
]

[project.optional-dependencies]
# HARD-02: BYOK live-model providers. Optional extra, imported lazily inside the
# adapter modules so the hermetic default suite needs neither installed. Install
# with `uv sync --extra providers` to run the `pytest -m live_model` lane.
providers = [
    "anthropic>=0.49",
    "openai>=1.60",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_agent"]
