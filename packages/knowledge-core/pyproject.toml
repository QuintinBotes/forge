[project]
name = "forge-knowledge"
version = "0.1.0"
description = "Chunking, embeddings, hybrid retrieval, RRF fusion, and reranking."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "forge-db",
    "numpy>=1.26",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_knowledge"]
