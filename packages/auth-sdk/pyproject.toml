[project]
name = "forge-auth"
version = "0.1.0"
description = "Pure auth & secrets crypto core for Forge (F37): envelope vault, platform keys, session JWT, flat RBAC, secret redaction."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "cryptography>=43",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_auth"]
