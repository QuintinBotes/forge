# Alembic configuration for forge-db.
#
# The database URL is resolved at runtime by ``migrations/env.py`` from the
# ``FORGE_DATABASE_URL`` environment variable (or the ``sqlalchemy.url`` set
# here / overridden by callers such as the test suite).
[alembic]
# %(here)s resolves to this file's directory, so the migrate command works from
# any CWD (e.g. ``alembic -c packages/db/alembic.ini upgrade head`` at repo root).
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
