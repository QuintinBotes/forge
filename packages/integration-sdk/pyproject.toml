[project]
name = "forge-integrations"
version = "0.1.0"
description = "GitHub App and Slack integration clients built against interfaces."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "httpx>=0.27",
    # HARD-01: RS256 App JWT signing for the live GitHub App auth flow. The
    # ``crypto`` extra pulls in ``cryptography`` (already an apps/api dep).
    "pyjwt[crypto]>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_integrations"]
