[project]
name = "forge-deploy"
version = "0.1.0"
description = "Deployment gates, environment promotion, and the deployment state machine for Forge (F31)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "forge-db",
    "forge-policy",
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_deploy"]
# `packages` already ships everything under forge_deploy/ (including the
# definitions/*.yaml); `artifacts` keeps the YAML included even if a VCS-ignore
# rule would otherwise drop it. A `force-include` of the same directory is
# redundant and makes the wheel build fail ("a second file is being added to the
# wheel archive at the same path"), so it is intentionally omitted.
artifacts = ["forge_deploy/definitions/*.yaml"]
