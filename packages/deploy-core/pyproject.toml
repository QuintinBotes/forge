[project]
name = "forge-deploy"
version = "0.1.0"
description = "Deployment gates, environment promotion, and the deployment state machine for Forge (F31)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "forge-db",
    "forge-policy",
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_deploy"]
artifacts = ["forge_deploy/definitions/*.yaml"]

[tool.hatch.build.targets.wheel.force-include]
"forge_deploy/definitions" = "forge_deploy/definitions"
