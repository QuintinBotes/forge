[project]
name = "forge-orchestration-policy"
version = "0.1.0"
description = "Adaptive Orchestration sizing: deterministic task/spec complexity and seniority-tier scoring."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_orchestration_policy"]
