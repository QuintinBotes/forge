[project]
name = "forge-authz"
version = "0.1.0"
description = "Pure, total permission resolver and RBAC permission tables for Forge (F30)."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
authors = [{ name = "The Forge Authors" }]
dependencies = [
    "forge-contracts",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forge_authz"]
