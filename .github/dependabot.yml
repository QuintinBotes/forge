# Dependabot configuration for the Forge monorepo.
#
# Ecosystems in this repo:
#   * uv             — the Python uv workspace. A single root uv.lock +
#                      pyproject.toml drive every member (packages/* and
#                      apps/{api,worker,mcp-gateway}); the "uv" ecosystem
#                      resolves the whole workspace from the root.
#   * npm            — the pnpm workspace. A single root pnpm-lock.yaml +
#                      pnpm-workspace.yaml drive the one JS member,
#                      apps/web (@forge/web); Dependabot updates workspace
#                      members from the pnpm root, so the entry lives at "/".
#   * github-actions — the first-party workflows under .github/workflows.
#
# Every ecosystem runs weekly and groups non-major (minor + patch) bumps into
# one PR to cut review noise; major bumps still open individually.
version: 2

updates:
  # ---------------------------------------------------------------- #
  # Python — uv workspace (single root uv.lock)                       #
  # ---------------------------------------------------------------- #
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------- #
  # JavaScript — pnpm workspace root (covers apps/web / @forge/web)   #
  # ---------------------------------------------------------------- #
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # eslint 10 needs eslint-plugin-react / eslint-config-next support that has
      # not shipped yet (eslint-plugin-react@7.37.5 still calls the removed
      # context.getFilename(), so `pnpm lint` crashes under v10; its peer range
      # is eslint "… || ^9.7"). Hold eslint at 9.x — still get 9.x minors/patches.
      # Remove this once the React/Next eslint plugins support eslint v10.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------- #
  # GitHub Actions — first-party workflows                            #
  # ---------------------------------------------------------------- #
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
