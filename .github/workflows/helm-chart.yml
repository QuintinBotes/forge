name: helm-chart

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-chart.yml"
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-chart.yml"
  workflow_dispatch:

concurrency:
  group: helm-chart-${{ github.ref }}
  cancel-in-progress: true

env:
  CHART: deploy/helm/forge

jobs:
  # ------------------------------------------------------------------- #
  # Static: lint + unittest + schema + render-contract + kubeconform     #
  # ------------------------------------------------------------------- #
  helm-static:
    name: helm (lint + unittest + schema + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.17.3

      - name: Install helm-unittest plugin
        # Pin to the last 0.x: 1.x plugin.yaml uses `platformHooks`, which needs
        # Helm >= 3.18; 0.8.2 loads on 3.16/3.17 and runs the same test format.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.8.2

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Add subchart repos (Bitnami postgres/redis)
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build chart dependencies
        run: helm dependency build ${CHART}

      - name: helm lint (defaults + production)
        run: |
          helm lint ${CHART}
          helm lint ${CHART} -f ${CHART}/values-production.yaml

      - name: helm template (three profiles)
        run: |
          helm template forge ${CHART} > /dev/null
          helm template forge ${CHART} -f ${CHART}/values.example.yaml > /dev/null
          helm template forge ${CHART} -f ${CHART}/values-production.yaml > /dev/null

      - name: helm unittest
        run: helm unittest ${CHART}

      - name: kubeconform (three profiles)
        run: |
          for profile in "" "-f ${CHART}/values.example.yaml" "-f ${CHART}/values-production.yaml"; do
            helm template forge ${CHART} $profile | \
              kubeconform -strict -ignore-missing-schemas \
                -kubernetes-version 1.28.0 -schema-location default -summary
          done

      - name: Python schema + render-contract tests
        run: uv run --with jsonschema --with pyyaml pytest deploy/helm/tests -q

  # ------------------------------------------------------------------- #
  # Integration: kind smoke install + upgrade (required before tagging)  #
  # ------------------------------------------------------------------- #
  helm-kind:
    name: helm (kind smoke install)
    runs-on: ubuntu-latest
    # Heavy; gate to main / manual runs (image build+load is the expensive piece).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.17.3

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: forge-ci

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Build the four Forge images under the `forge/<svc>:<appVersion>` tags the
      # kind smoke overlay (deploy/helm/forge/tests/e2e/values.kind.yaml) expects.
      # The test fixture loads these + the datastore/test images into the cluster
      # and stands up the in-cluster external pgvector/redis (datastores.yaml), so
      # no bundled Bitnami subchart images are pulled.
      - name: Build the four Forge images
        run: |
          for svc in api worker web mcp-gateway; do
            docker build -t forge/$svc:0.1.0 -f deploy/docker/$svc.Dockerfile .
          done

      # The chart declares postgresql/redis/minio subchart deps in Chart.yaml, so
      # `helm install`/`upgrade` needs them vendored into charts/ before it runs —
      # even though the kind overlay disables them (it stands up external in-cluster
      # datastores). Without this, install fails "missing in charts/ directory".
      - name: Add subchart repos + build chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build ${CHART}

      - name: Run kind smoke tests (install + helm test + upgrade/rollback)
        env:
          FORGE_KIND_CLUSTER: forge-ci   # reuse the kind-action cluster
        run: uv run --with pyyaml pytest deploy/helm/tests/e2e -q -m kind
