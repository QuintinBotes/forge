# Forge — production single-node Docker Compose (plan Task 0.6; HARD-07 pinned).
#
# Hardened per the spec's "Production Docker Compose Requirements":
#   - every pulled image pinned name:tag@sha256:<digest> (immutable; see
#     deploy/build-manifest.json — roll forward with deploy/scripts/pin-digests.sh)
#   - willfarrell/autoheal sidecar restarts containers labelled autoheal=true
#   - named volumes for stateful data (never bind mounts in production)
#   - CPU + memory resource limits on every container
#   - healthchecks on every long-running service (stdlib probes — the slim
#     runtime images ship no curl/wget, so api/mcp-gateway probe via python
#     urllib and web via node fetch)
#   - segmented networks (edge / backend / data / mcp) — db is not on the edge
#   - app containers run as a non-root user
#   - per-container log rotation (max-size 100m, max-file 5)
#
# Bring it up with:  docker compose -f deploy/docker-compose.yml up -d --remove-orphans
# Smoke-test it with: deploy/scripts/smoke.sh  (up -> healthy -> /health -> down -v)

services:
  # --------------------------------------------------------------------- #
  # Data tier                                                             #
  # --------------------------------------------------------------------- #
  db:
    image: pgvector/pgvector:pg16@sha256:ad2e18408bf447f62092a8a5259e7df10505c5a0360bd1a1853ac8b8b0763da2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z@sha256:9535594ad4122b7a78c6632788a989b96d9199b483d3bd71a5ceae73a922cdfa
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forge-change-me}
    volumes:
      - minio-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # Application tier                                                      #
  # --------------------------------------------------------------------- #
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    image: forge/api:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    # HARD-11: give the API time to drain in-flight requests on SIGTERM before
    # Docker sends SIGKILL. Must be >= FORGE_SHUTDOWN_DRAIN_SECONDS + slack so the
    # lifespan can flip readiness to 503, drain, and dispose pools cleanly.
    stop_grace_period: 45s
    environment:
      FORGE_ENVIRONMENT: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      # HARD-11 reliability primitives (defaults shown; tune per deployment).
      FORGE_SHUTDOWN_DRAIN_SECONDS: ${FORGE_SHUTDOWN_DRAIN_SECONDS:-30}
      FORGE_RATE_LIMIT_ENABLED: ${FORGE_RATE_LIMIT_ENABLED:-true}
      FORGE_IDEMPOTENCY_ENABLED: ${FORGE_IDEMPOTENCY_ENABLED:-true}
      FORGE_READINESS_REQUIRE_DEPS: ${FORGE_READINESS_REQUIRE_DEPS:-true}
      MINIO_ENDPOINT: http://minio:9000
      MCP_GATEWAY_URL: http://mcp-gateway:8001
      # HARD-13: the instance master KEK. ``:?`` fails the ``up`` when unset, so a
      # production stack can never boot with an ephemeral key (fail-closed at the
      # orchestration layer, mirroring the app + CI check-config gate). Prefer the
      # mounted Docker secret below (FORGE_SECRET_KEY_FILE) over an inline value.
      FORGE_SECRET_KEY: ${FORGE_SECRET_KEY:?set a stable FORGE_SECRET_KEY (see deploy/.env.production.example)}
      FORGE_SECRET_KEY_FILE: /run/secrets/forge_secret_key
      # Two-tier envelope encryption for BYOK secrets (rotatable, versioned KEK).
      FORGE_ENVELOPE_ENCRYPTION: ${FORGE_ENVELOPE_ENCRYPTION:-true}
      # HARD-02 BYOK model provider. The API resolves a per-workspace model client
      # via AuthService.resolve_model_client -> ModelClientConfig.from_env(), whose
      # env fallback (no vault secret_id) reads these same vars — so they must reach
      # the api, not just the worker. Empty-default == unset == offline scripted
      # client (from_env strips/falsy-checks them). Passed explicitly: this service
      # uses an `environment:` map with no env_file (a root .env only fills ${VAR}).
      FORGE_MODEL_PROVIDER: ${FORGE_MODEL_PROVIDER:-}
      FORGE_MODEL_NAME: ${FORGE_MODEL_NAME:-}
      FORGE_MODEL_API_KEY: ${FORGE_MODEL_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Incident alert webhook signing secrets (F17); absent -> 501 fail-closed.
      FORGE_PAGERDUTY_WEBHOOK_SECRET: ${FORGE_PAGERDUTY_WEBHOOK_SECRET:-}
      FORGE_DATADOG_WEBHOOK_SECRET: ${FORGE_DATADOG_WEBHOOK_SECRET:-}
      FORGE_SENTRY_WEBHOOK_SECRET: ${FORGE_SENTRY_WEBHOOK_SECRET:-}
      FORGE_GRAFANA_WEBHOOK_SECRET: ${FORGE_GRAFANA_WEBHOOK_SECRET:-}
      # HARD-01 live GitHub App auth. The private key is a FILE MOUNT (below),
      # never an env value; unset ids -> integration routes fail closed.
      FORGE_GITHUB_APP_ID: ${FORGE_GITHUB_APP_ID:-}
      FORGE_GITHUB_INSTALLATION_ID: ${FORGE_GITHUB_INSTALLATION_ID:-}
      FORGE_GITHUB_APP_PRIVATE_KEY_PATH: /run/secrets/github-app.pem
      FORGE_GITHUB_WEBHOOK_SECRET: ${FORGE_GITHUB_WEBHOOK_SECRET:-}
      FORGE_GITHUB_API_URL: ${FORGE_GITHUB_API_URL:-https://api.github.com}
      # HARD-06 live Slack integration. The bot token + signing secret are
      # secrets (never committed). Unset signing secret -> the inbound
      # /integration/slack/{commands,interactions} routes fail closed (501).
      FORGE_SLACK_TOKEN: ${FORGE_SLACK_TOKEN:-}
      FORGE_SLACK_SIGNING_SECRET: ${FORGE_SLACK_SIGNING_SECRET:-}
      FORGE_SLACK_DEFAULT_CHANNEL: ${FORGE_SLACK_DEFAULT_CHANNEL:-}
      # F35 public benchmark leaderboard — DISABLED by default (self-hosted
      # privacy: /public/* 404s until an operator explicitly opts in).
      FORGE_PUBLIC_LEADERBOARD_ENABLED: ${FORGE_PUBLIC_LEADERBOARD_ENABLED:-false}
      FORGE_BENCHMARK_VERIFY_EPSILON: ${FORGE_BENCHMARK_VERIFY_EPSILON:-0.005}
      FORGE_LEADERBOARD_PUBLIC_RATE_LIMIT: ${FORGE_LEADERBOARD_PUBLIC_RATE_LIMIT:-60}
      FORGE_LEADERBOARD_CACHE_TTL_SECONDS: ${FORGE_LEADERBOARD_CACHE_TTL_SECONDS:-60}
      FORGE_BENCHMARK_SUBMISSION_MAX_BYTES: ${FORGE_BENCHMARK_SUBMISSION_MAX_BYTES:-52428800}
    volumes:
      # HARD-01: the GitHub App private key is a read-only FILE MOUNT, never an
      # env value. The dir (deploy/secrets/) is tracked only via its README; the
      # .pem is operator-provided + gitignored. Absent key -> routes fail closed.
      - ./secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - backend
      - data
      - mcp
    healthcheck:
      # stdlib probe: the uv slim runtime image ships no curl/wget (HARD-07).
      test:
        # HARD-11: probe the drain-aware readiness endpoint so a draining
        # instance (SIGTERM received) is taken out of rotation before it exits.
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')\" || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    image: forge/worker:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    # HARD-11: warm (graceful) shutdown. Celery traps SIGTERM, stops prefetching,
    # and finishes in-flight tasks before exiting; give it a generous grace so a
    # long-running task can complete (or, with acks_late, be re-queued) rather
    # than being SIGKILLed mid-run.
    stop_grace_period: 120s
    stop_signal: SIGTERM
    # Consume the default queue plus the dedicated F17 `incident` queue, so
    # long-running incident diagnosis / recovery monitoring does not starve the
    # feature/verification/indexing work on the default queue.
    command: ["celery", "-A", "forge_worker", "worker", "--loglevel=info", "-Q", "forge,incident"]
    environment:
      FORGE_ENVIRONMENT: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MCP_GATEWAY_URL: http://mcp-gateway:8001
      # HARD-11 worker reliability (acks_late re-queues an interrupted task; fair
      # prefetch + per-child cap bound memory; soft/hard limits stop runaways).
      FORGE_WORKER_PREFETCH_MULTIPLIER: ${FORGE_WORKER_PREFETCH_MULTIPLIER:-1}
      FORGE_WORKER_MAX_TASKS_PER_CHILD: ${FORGE_WORKER_MAX_TASKS_PER_CHILD:-200}
      FORGE_TASK_SOFT_TIME_LIMIT: ${FORGE_TASK_SOFT_TIME_LIMIT:-300}
      FORGE_TASK_TIME_LIMIT: ${FORGE_TASK_TIME_LIMIT:-360}
      FORGE_TASK_MAX_RETRIES: ${FORGE_TASK_MAX_RETRIES:-3}
      # HARD-13: the worker resolves BYOK secrets through the same master KEK as
      # the API; fail-closed if unset (no ephemeral key in production).
      FORGE_SECRET_KEY: ${FORGE_SECRET_KEY:?set a stable FORGE_SECRET_KEY (see deploy/.env.production.example)}
      FORGE_ENVELOPE_ENCRYPTION: ${FORGE_ENVELOPE_ENCRYPTION:-true}
      # HARD-02 BYOK model provider. FORGE_MODEL_PROVIDER (anthropic|openai) is the
      # master switch; unset OR empty -> the offline deterministic scripted client
      # (ModelClientConfig.from_env strips/falsy-checks these, so the empty-default
      # form below is unset-equivalent). The key is BYOK: provider-native
      # ANTHROPIC_API_KEY / OPENAI_API_KEY win, FORGE_MODEL_API_KEY is the
      # provider-agnostic fallback. Passed explicitly because this service uses an
      # `environment:` map with no env_file, so a root .env only reaches ${VAR} refs.
      FORGE_MODEL_PROVIDER: ${FORGE_MODEL_PROVIDER:-}
      FORGE_MODEL_NAME: ${FORGE_MODEL_NAME:-}
      FORGE_MODEL_API_KEY: ${FORGE_MODEL_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # F27 multi-agent coordinator (supervised runs). Read by forge_coordinator's
      # CoordinatorSettings (MULTI_AGENT_ENABLED); "false"/unset keeps supervised
      # runs single-agent (escalate with reason `multi_agent_disabled`).
      MULTI_AGENT_ENABLED: ${MULTI_AGENT_ENABLED:-false}
      FORGE_PAGERDUTY_WEBHOOK_SECRET: ${FORGE_PAGERDUTY_WEBHOOK_SECRET:-}
      FORGE_DATADOG_WEBHOOK_SECRET: ${FORGE_DATADOG_WEBHOOK_SECRET:-}
      FORGE_SENTRY_WEBHOOK_SECRET: ${FORGE_SENTRY_WEBHOOK_SECRET:-}
      FORGE_GRAFANA_WEBHOOK_SECRET: ${FORGE_GRAFANA_WEBHOOK_SECRET:-}
      # HARD-01 live GitHub App auth (same file mount + env as the api service);
      # the worker's PR-open / knowledge-sync flows inherit App auth transparently.
      FORGE_GITHUB_APP_ID: ${FORGE_GITHUB_APP_ID:-}
      FORGE_GITHUB_INSTALLATION_ID: ${FORGE_GITHUB_INSTALLATION_ID:-}
      FORGE_GITHUB_APP_PRIVATE_KEY_PATH: /run/secrets/github-app.pem
      FORGE_GITHUB_WEBHOOK_SECRET: ${FORGE_GITHUB_WEBHOOK_SECRET:-}
      FORGE_GITHUB_API_URL: ${FORGE_GITHUB_API_URL:-https://api.github.com}
      # F19 container sandboxing — the worker reaches the daemon ONLY via the
      # socket-proxy (never the raw socket); a per-task container mounts only the
      # run's subpath of the worktree volume.
      FORGE_SANDBOX_KIND: ${FORGE_SANDBOX_KIND:-worktree}
      DOCKER_HOST: tcp://docker-proxy:2375
      FORGE_SANDBOX_DOCKER_HOST: tcp://docker-proxy:2375
      FORGE_SANDBOX_WORKTREE_VOLUME: ${FORGE_WORKTREE_VOLUME:-forge_repos}
      FORGE_SANDBOX_IMAGE_PYTHON: ${FORGE_SANDBOX_IMAGE_PYTHON:-ghcr.io/forge-platform/forge-sandbox-python:0.1.0}
      FORGE_SANDBOX_IMAGE_NODE: ${FORGE_SANDBOX_IMAGE_NODE:-ghcr.io/forge-platform/forge-sandbox-node:0.1.0}
      FORGE_SANDBOX_IMAGE_GO: ${FORGE_SANDBOX_IMAGE_GO:-ghcr.io/forge-platform/forge-sandbox-go:0.1.0}
      FORGE_SANDBOX_ALLOWED_IMAGES: ${FORGE_SANDBOX_ALLOWED_IMAGES:-}
      FORGE_SANDBOX_NETWORK: ${FORGE_SANDBOX_NETWORK:-none}
      FORGE_SANDBOX_EGRESS_NETWORK: forge_sandbox_egress
      FORGE_SANDBOX_EGRESS_ALLOWLIST: ${FORGE_SANDBOX_EGRESS_ALLOWLIST:-pypi.org,files.pythonhosted.org,registry.npmjs.org}
      FORGE_SANDBOX_REAP_INTERVAL_SECONDS: ${FORGE_SANDBOX_REAP_INTERVAL_SECONDS:-300}
      FORGE_SANDBOX_MAX_TTL_SECONDS: ${FORGE_SANDBOX_MAX_TTL_SECONDS:-21600}
      # F34 kernel-boundary sandboxing — gvisor (runsc) / microvm (kata-fc).
      # Selecting a runtime is part of `POST /containers/create` (no new proxy
      # verbs); the HOST daemon needs the runtime registered (install-runtimes.sh)
      # and /dev/kvm for microvm — never a silent downgrade (preflight.sh gates).
      FORGE_SANDBOX_GVISOR_RUNTIME: ${FORGE_SANDBOX_GVISOR_RUNTIME:-runsc}
      FORGE_SANDBOX_GVISOR_PLATFORM: ${FORGE_SANDBOX_GVISOR_PLATFORM:-systrap}
      FORGE_SANDBOX_MICROVM_RUNTIME: ${FORGE_SANDBOX_MICROVM_RUNTIME:-kata-fc}
      FORGE_SANDBOX_MICROVM_VCPUS: ${FORGE_SANDBOX_MICROVM_VCPUS:-}
      FORGE_SANDBOX_MICROVM_MEMORY_MB: ${FORGE_SANDBOX_MICROVM_MEMORY_MB:-}
      FORGE_SANDBOX_REQUIRE_KVM: ${FORGE_SANDBOX_REQUIRE_KVM:-true}
      FORGE_SANDBOX_JAILER_ROOT: ${FORGE_SANDBOX_JAILER_ROOT:-/var/lib/forge/jailer}
    volumes:
      # Worktrees live on a named volume so sibling sandbox containers can mount
      # only their run's subpath (volume-subpath; Docker Engine >= 26.1).
      - forge_repos:/srv/forge/worktrees
      # HARD-01: read-only GitHub App private key mount (see the api service).
      - ./secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - backend
      - data
      - mcp
      - sandbox_ctl
    healthcheck:
      test: ["CMD-SHELL", "celery -A forge_worker inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  mcp-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/mcp-gateway.Dockerfile
    image: forge/mcp-gateway:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      FORGE_ENVIRONMENT: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      # HARD-13: fail-closed master KEK (same key as api/worker).
      FORGE_SECRET_KEY: ${FORGE_SECRET_KEY:?set a stable FORGE_SECRET_KEY (see deploy/.env.production.example)}
      FORGE_ENVELOPE_ENCRYPTION: ${FORGE_ENVELOPE_ENCRYPTION:-true}
      # HARD-05: live MCP transport is opt-in. Unset/false -> NullTransport (503
      # on any live op). Set true to drive real MCP servers over real HTTP/stdio.
      MCP_LIVE_TRANSPORT: ${MCP_LIVE_TRANSPORT:-false}
      MCP_HTTP_TIMEOUT_S: ${MCP_HTTP_TIMEOUT_S:-30}
      MCP_PROTOCOL_VERSION: ${MCP_PROTOCOL_VERSION:-2025-06-18}
      # Per-connection token is resolved from the vault (secret://mcp/<slug>);
      # MCP_TOKEN is a dev/integration fallback only. Never commit a real value.
      MCP_TOKEN: ${MCP_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      # `edge` is load-bearing: the Caddy edge proxy (and the drop-in nginx
      # alternative, deploy/nginx/forge.conf) sits ONLY on `edge` and routes
      # /mcp/* -> mcp-gateway:8001. Without membership here the proxy and the
      # gateway share no network, so /mcp/* resolves nowhere and 502s. `mcp`
      # keeps the api/worker <-> gateway path; `backend` its other peers.
      - edge
      - backend
      - mcp
    healthcheck:
      # stdlib probe: the uv slim runtime image ships no curl/wget (HARD-07).
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    image: forge/web:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      NODE_ENV: production
      # NOTE: NEXT_PUBLIC_API_URL is deliberately NOT set here. `NEXT_PUBLIC_*`
      # is inlined into the web bundle at BUILD time (see web.Dockerfile /
      # apps/web/next.config.mjs), so a runtime env var is too late to reach the
      # client — it was dead config. The browser client now derives a same-origin
      # `/api` base at runtime, which the edge routes to the API (see
      # apps/web/src/lib/api/api-url.ts + docs/self-hosting/reverse-proxy.md).
      # To target a non-same-origin API, pass NEXT_PUBLIC_API_URL as a BUILD arg.
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
      - backend
    healthcheck:
      # node fetch probe: node:*-slim ships no wget/curl (HARD-07).
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\" || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # Edge + ops                                                            #
  # --------------------------------------------------------------------- #
  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: unless-stopped
    ports:
      # Env-overridable so a smoke/staging bring-up can avoid clobbering a host
      # that already serves 80/443; production defaults are unchanged.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    networks:
      - edge
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  autoheal:
    image: willfarrell/autoheal:1.2.0@sha256:31f580ef0279eaced5b38d631b08c474d70d8403c1c2fdd6ddcf2e879d5f3f7c
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # F19 container sandboxing — socket-proxy + egress-proxy                #
  # --------------------------------------------------------------------- #
  # The ONLY component near the raw Docker socket (read-only, documented
  # exception like `autoheal`). Restricted to the minimal verbs the worker
  # needs to create/exec/inspect per-task sandbox containers — no NETWORKS
  # create, no VOLUMES delete, no swarm, no privileged.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      IMAGES: "1"
      POST: "1"
      EXEC: "1"
      INFO: "1"
      # everything else denied
      NETWORKS: "0"
      VOLUMES: "0"
      SWARM: "0"
      SERVICES: "0"
      TASKS: "0"
      SECRETS: "0"
      CONFIGS: "0"
      NODES: "0"
      PLUGINS: "0"
      SYSTEM: "0"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      DISTRIBUTION: "0"
      SESSION: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sandbox_ctl
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # Allow-listing forward proxy for `network: egress` sandboxes. Dual-homed:
  # the internal `sandbox_egress` network (sandbox containers' ONLY route out)
  # plus `backend` for the bridge to the registry hosts on the allowlist.
  sandbox-proxy:
    image: ubuntu/squid:6.6-24.04_edge@sha256:8a3baed477e2c282ab8aa5edad442f69873246964f225c5c2ae8364b6610963c
    restart: unless-stopped
    volumes:
      - ./sandbox/squid.conf:/etc/squid/squid.conf:ro
    networks:
      - sandbox_egress
      - backend
    healthcheck:
      test: ["CMD-SHELL", "squid -k check >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # F25 — Temporal durable workflow engine (V2, opt-in via the `temporal`  #
  # profile + WORKFLOW_ENGINE_BACKEND=temporal). Inherits F14's hardening  #
  # matrix: pinned images, healthchecks, resource limits, capped logs,     #
  # autoheal, internal-only networks, no host ports (the Web UI is reached #
  # only via Caddy's admin-gated /_temporal route).                        #
  # --------------------------------------------------------------------- #
  temporal:
    image: temporalio/auto-setup:1.25.2@sha256:b1edc1e20002d958c8182f2ae08dee877a125083683a627a44917683419ba6a8
    profiles: [temporal]
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_SEEDS: db
      # auto-setup creates the `temporal` / `temporal_visibility` logical DBs.
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      NUM_HISTORY_SHARDS: "4"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - data
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  temporal-ui:
    image: temporalio/ui:2.34.0@sha256:cb17ea423d76a8a19a269d0bcd81fc12eee1f6365acd2a56b590dafb35696a95
    profiles: [temporal]
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost
      # Served only behind Caddy's admin-gated /_temporal route (no host port).
      TEMPORAL_UI_PUBLIC_PATH: /_temporal
    depends_on:
      - temporal
    networks:
      - backend
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  temporal-worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    image: forge/worker:${FORGE_VERSION:-0.1.0}
    profiles: [temporal]
    restart: unless-stopped
    user: "1000:1000"
    command: ["python", "-m", "forge_worker.temporal_main"]
    environment:
      FORGE_ENVIRONMENT: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      MCP_GATEWAY_URL: http://mcp-gateway:8001
      WORKFLOW_ENGINE_BACKEND: temporal
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-forge}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-forge-feature}
      TEMPORAL_CODEC_KEY: ${TEMPORAL_CODEC_KEY:-}
      AGENT_ACTIVITY_TIMEOUT: ${AGENT_ACTIVITY_TIMEOUT:-7200}
      FORGE_SANDBOX_WORKTREE_VOLUME: ${FORGE_WORKTREE_VOLUME:-forge_repos}
    volumes:
      - forge_repos:/srv/forge/worktrees
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - backend
      - data
      - mcp
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import forge_worker.temporal_main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # HARD-10 — Observability stack (opt-in via the `observability` profile). #
  # OTLP collector + Prometheus + Grafana + Loki + Tempo + Alertmanager,    #
  # all on the `internal: true` observability network. No host-published    #
  # port: Grafana is reached only through Caddy's admin-gated /grafana      #
  # route; the collector/Prometheus join `backend` so the apps can push     #
  # OTLP and be scraped. Same F14 hardening matrix as every other service:  #
  # pinned @sha256, non-root user, healthcheck, CPU/mem limits, capped      #
  # logs, autoheal.                                                         #
  # --------------------------------------------------------------------- #
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1@sha256:d2da12c4336a79758826700be9e21ecf4a9f7d945b7f8a58ba55ee3fa45427c8
    profiles: [observability]
    restart: unless-stopped
    user: "10001:10001"
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - observability
      - backend
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol-contrib/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  prometheus:
    image: prom/prometheus:v3.1.0@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218
    profiles: [observability]
    restart: unless-stopped
    user: "65534:65534"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - observability
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  grafana:
    image: grafana/grafana:11.4.0@sha256:d8ea37798ccc41061a62ab080f2676dda6bf7815558499f901bdb0f533a456fb
    profiles: [observability]
    restart: unless-stopped
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-forge-change-me}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  loki:
    image: grafana/loki:3.3.2@sha256:8af2de1abbdd7aa92b27c9bcc96f0f4140c9096b507c77921ffddf1c6ad6c48f
    profiles: [observability]
    restart: unless-stopped
    user: "10001:10001"
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  tempo:
    image: grafana/tempo:2.6.1@sha256:ef4384fce6e8ad22b95b243d8fc165628cda655376fd50e7850536ad89d71d50
    profiles: [observability]
    restart: unless-stopped
    user: "10001:10001"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  alertmanager:
    image: prom/alertmanager:v0.28.0@sha256:d5155cfac40a6d9250ffc97c19db2c5e190c7bc57c6b67125c94903358f8c7d8
    profiles: [observability]
    restart: unless-stopped
    user: "65534:65534"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
    internal: true
  mcp:
    driver: bridge
  # Worker <-> docker-proxy only; no route to the internet.
  sandbox_ctl:
    driver: bridge
    internal: true
  # Sandbox containers <-> sandbox-proxy only; the proxy bridges out.
  sandbox_egress:
    driver: bridge
    internal: true
  # HARD-10 observability stack — no route to the internet; the collector and
  # Prometheus are additionally dual-homed on `backend` to reach the apps.
  observability:
    driver: bridge
    internal: true

volumes:
  db-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
  # Worktrees, mounted by the worker and (subpath) by sandbox containers.
  forge_repos:
  # HARD-10 observability stateful stores.
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  alertmanager-data:
