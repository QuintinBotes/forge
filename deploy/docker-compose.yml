# Forge — production single-node Docker Compose (plan Task 0.6).
#
# Hardened per the spec's "Production Docker Compose Requirements":
#   - images pinned to explicit versions (see PARKED note on @sha256 below)
#   - willfarrell/autoheal sidecar restarts containers labelled autoheal=true
#   - named volumes for stateful data (never bind mounts in production)
#   - CPU + memory resource limits on every container
#   - healthchecks on every long-running service
#   - segmented networks (edge / backend / data / mcp) — db is not on the edge
#   - app containers run as a non-root user
#   - per-container log rotation (max-size 100m, max-file 5)
#
# Bring it up with:  docker compose -f deploy/docker-compose.yml up -d --remove-orphans
#
# PARKED: pinning by immutable @sha256 digest (spec best practice) requires
# resolving digests from a registry, which needs network access not available in
# the overnight sandbox. Images are pinned to explicit version tags here; replace
# each `image:` with `name@sha256:...` before a real production rollout.

services:
  # --------------------------------------------------------------------- #
  # Data tier                                                             #
  # --------------------------------------------------------------------- #
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forge-change-me}
    volumes:
      - minio-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # Application tier                                                      #
  # --------------------------------------------------------------------- #
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    image: forge/api:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      FORGE_ENV: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MCP_GATEWAY_URL: http://mcp-gateway:8001
      SECRET_KEY: ${SECRET_KEY:-change-me}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - backend
      - data
      - mcp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    image: forge/worker:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      FORGE_ENV: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MCP_GATEWAY_URL: http://mcp-gateway:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - data
      - mcp
    healthcheck:
      test: ["CMD-SHELL", "celery -A forge_worker inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  mcp-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/mcp-gateway.Dockerfile
    image: forge/mcp-gateway:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      FORGE_ENV: production
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - mcp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    image: forge/web:${FORGE_VERSION:-0.1.0}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  # --------------------------------------------------------------------- #
  # Edge + ops                                                            #
  # --------------------------------------------------------------------- #
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    networks:
      - edge
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
    internal: true
  mcp:
    driver: bridge

volumes:
  db-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
