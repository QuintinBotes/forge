# Forge OpenTelemetry Collector (HARD-10, observability profile).
#
# Single ingress for traces/metrics/logs over OTLP (gRPC :4317 + HTTP :4318),
# fanned out to the self-hosted Grafana stack:
#   - traces  -> Tempo   (OTLP)
#   - metrics -> Prometheus (scraped from the collector's /metrics exposition)
#   - logs    -> Loki    (OTLP-native ingest)
#
# The collector is the ONLY component apps talk to; it lives on the internal
# `observability` network with no host-published port. `memory_limiter` +
# `batch` bound resource use; `attributes` drops any label that could smuggle a
# secret or an unbounded id into a permanent sink (defense-in-depth on top of
# the app-side redaction that already runs before export).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Cap collector memory so a telemetry spike can never OOM the node.
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  batch:
    send_batch_size: 1024
    timeout: 5s
  # Stamp a uniform resource identity + strip forbidden high-cardinality /
  # secret-shaped attributes as a last line of defense before a permanent sink.
  resource:
    attributes:
      - key: deployment.environment
        from_attribute: forge.environment
        action: upsert
  attributes/scrub:
    actions:
      - key: authorization
        action: delete
      - key: api_key
        action: delete
      - key: x-api-key
        action: delete

exporters:
  # Traces -> Tempo (OTLP gRPC).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Logs -> Loki (OTLP-native ingest endpoint).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  # Metrics -> exposed for Prometheus to scrape from the collector itself.
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes/scrub, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes/scrub, batch]
      exporters: [otlphttp/loki]
  telemetry:
    logs:
      level: warn
