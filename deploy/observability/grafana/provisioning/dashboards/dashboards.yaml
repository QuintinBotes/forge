# Forge Grafana dashboard provider (HARD-10 §3.5). Loads the four dashboards-as-
# code from /var/lib/grafana/dashboards at boot; operators cannot delete them
# from the UI (foldersFromFilesStructure keeps them under one Forge folder).

apiVersion: 1

providers:
  - name: forge
    orgId: 1
    folder: Forge
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
