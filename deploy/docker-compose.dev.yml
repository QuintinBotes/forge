# Forge — local development Docker Compose (plan Task 0.6).
#
# Self-contained: `make dev` runs ONLY this file. It favours fast iteration over
# the hardening of the production file — source is bind-mounted for hot reload,
# ports are published to the host, and the edge proxy / autoheal sidecar are
# omitted (talk to services directly on localhost).
#
#   make dev   ->  docker compose -f deploy/docker-compose.dev.yml up --remove-orphans
#   Web UI: http://localhost:3000   API: http://localhost:8000

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    ports:
      - "5432:5432"
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forge-change-me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dev-minio-data:/data

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    image: forge/api:dev
    command: ["uvicorn", "forge_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      FORGE_ENV: development
      FORGE_DEBUG: "true"
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
      MCP_GATEWAY_URL: http://mcp-gateway:8001
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    image: forge/worker:dev
    command: ["celery", "-A", "forge_worker", "worker", "--loglevel=info"]
    environment:
      FORGE_ENV: development
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
      FORGE_REDIS_URL: redis://redis:6379/0
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/mcp-gateway.Dockerfile
    image: forge/mcp-gateway:dev
    command:
      - "uvicorn"
      - "forge_mcp_gateway.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--reload"
    environment:
      FORGE_ENV: development
      FORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@db:5432/${POSTGRES_DB:-forge}
    volumes:
      - ..:/app
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    image: forge/web:dev
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../apps/web:/app/apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  dev-db-data:
  dev-redis-data:
  dev-minio-data:
