# Forge — nginx reverse-proxy alternative to deploy/caddy/Caddyfile (Task 5).
#
# This is a faithful routing equivalent of the default Caddy edge
# (deploy/caddy/Caddyfile): same upstreams (service:port pairs come straight
# from deploy/docker-compose.yml), same paths, same websocket handling. Use it
# in place of Caddy when an operator wants a config surface they already know,
# or needs nginx-specific features (an existing nginx-based LB/WAF, etc.). See
# docs/self-hosting/reverse-proxy.md for how to wire this in and the concrete
# differences from the Caddy default — most importantly, nginx does not
# auto-provision TLS the way Caddy does (see the commented-out TLS block
# below).
#
# Validation performed in the authoring environment (docker was available):
#   docker run --rm -v "$PWD/deploy/nginx/forge.conf:/etc/nginx/conf.d/forge.conf:ro" nginx:alpine nginx -t
# passed ("syntax is ok" / "test is successful"), plus a manual functional
# smoke test (real nginx:alpine container + traefik/whoami stand-ins named
# api/mcp-gateway/web/grafana/temporal-ui) confirming each route below reaches
# the right upstream with the right path (stripped or not) and that
# basic-auth-gated routes 401 without credentials. This is config-syntax +
# routing-logic validation only — it was NOT run against the real Forge
# services or the actual docker-compose.yml network topology. See
# docs/self-hosting/reverse-proxy.md and .superpowers/sdd/task-5-report.md for
# the full account.
#
# Mount this file at /etc/nginx/conf.d/forge.conf. The stock nginx:alpine image
# also ships /etc/nginx/conf.d/default.conf; remove or override that mount too
# (see the doc) or you will get two `listen 80` server blocks.

# Caddy's `reverse_proxy` autodetects the `Upgrade` header and proxies
# websockets with no extra config. nginx needs this map (standard recipe) plus
# the two proxy_set_header lines below on every websocket location.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    # Caddyfile: `{$DOMAIN:localhost} { ... }`. nginx config files have no
    # runtime env-var substitution; set this to your real DOMAIN, or render
    # this file through `envsubst` (or a templating step) at container start.
    server_name _;

    # Caddy resolves each upstream's DNS name lazily, per-request, so it
    # never cares what order Compose starts services in. Static nginx
    # `upstream {}` blocks resolve once at startup and fail hard
    # ("host not found in upstream") if that name isn't up yet — a real
    # regression vs. Caddy's behavior with Compose's non-deterministic start
    # order. Using a variable in `proxy_pass` (below, on every location) plus
    # this `resolver` defers resolution to request time instead, matching
    # Caddy. 127.0.0.11 is Docker's embedded DNS server, present in every
    # container on a user-defined network (i.e. any Compose network here).
    resolver 127.0.0.11 valid=10s;

    # --- TLS (commented out; see docs/self-hosting/reverse-proxy.md) --------
    # Caddyfile's top-level `{ email {$ACME_EMAIL:admin@localhost} }` block
    # plus the `{$DOMAIN:localhost} { ... }` site block get Caddy automatic
    # ACME certificate issuance and renewal for free. nginx has no built-in
    # ACME client: run certbot/acme.sh alongside it (or terminate TLS
    # upstream of nginx) and uncomment something like:
    #
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # # then, on this :80 server, redirect instead of serving directly:
    # # return 301 https://$host$request_uri;
    # -------------------------------------------------------------------------

    # Caddyfile: `encode gzip zstd`. Stock nginx ships gzip only — no zstd
    # module — so this is a partial parity gap; see the doc.
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/x-ndjson;

    # Caddyfile: `header { Strict-Transport-Security ...; X-Content-Type-Options
    # nosniff; Referrer-Policy ...; -Server }` applied to every route.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Caddy's `-Server` strips the Server header outright. Stock nginx has no
    # directive to remove it entirely (that needs the third-party
    # headers-more module); `server_tokens off` is the closest built-in
    # equivalent — it drops the version string but the bare "nginx" token
    # remains. Noted as a gap in the doc.
    server_tokens off;

    # Caddyfile: `log { output stdout; format console }`. The official nginx
    # image already symlinks its default access/error logs to stdout/stderr;
    # these are explicit for clarity.
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Caddyfile lines 24-34: alert-provider (PagerDuty/Datadog/Sentry/Grafana)
    # and PM (Jira/Linear) webhook signatures are HMAC'd over the EXACT raw
    # request body, so these paths MUST reach the API byte-for-byte. Caddy
    # never buffers request bodies by default; nginx does, so
    # `proxy_request_buffering off` is load-bearing here, not decorative.
    location ~ ^/api/v1/integrations/alerts/[^/]+/webhook$ {
        # No URI segment on proxy_pass: forwards the path verbatim, matching
        # Caddy's `handle` (as opposed to the prefix-stripping `handle_path`
        # used for the general /api/* surface below).
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/integrations/pm/webhooks/ {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caddyfile: `handle /public/*` (F35 public leaderboard) — no prefix
    # stripping; the API mounts this router at its own root path.
    location /public/ {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Realtime WebSockets (forge_api.routers.realtime): board push (`/ws`) and
    # CRDT spec co-editing (`/ws/spec/{spec_id}`). Per docs/architecture.md
    # ("Trust layer & provenance"), these mount at the API app ROOT, not under
    # /api. The Caddyfile has no dedicated handle block for either path today
    # — absent one, both would fall through to the catch-all `web:3000` route
    # below, which is wrong (the socket only exists on `api`). Added here
    # explicitly per this task's brief; flagged in the task report as a gap
    # worth also closing in the Caddyfile.
    location = /ws {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A long-lived socket: nginx's 60s default proxy_read_timeout would
        # kill an idle connection. 3600s matches the read/send timeout this
        # repo already uses for its nginx-ingress ws/SSE routes (see
        # deploy/helm/forge/values.yaml `ingress.sseReadTimeout`).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /ws/spec/ {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Caddyfile: `handle_path /api/*` — strips the `/api` prefix before
    # forwarding. A variable in proxy_pass (needed for deferred DNS
    # resolution, see the `resolver` comment above) disables nginx's usual
    # "trailing slash on proxy_pass" prefix-stripping trick, so the `rewrite
    # ... break` does the strip explicitly instead — same net effect. Also
    # carries the NDJSON audit-export stream (forge_api.routers.audit
    # `/audit/export`); buffering is disabled so it flushes the way Caddy's
    # unbuffered default does.
    location /api/ {
        # `set` must run before `rewrite ... break` — `break` halts all
        # further rewrite-module directives (including a later `set`) for
        # this request, which would otherwise leave $upstream_api empty.
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Caddyfile: `handle_path /mcp/*` — strips the `/mcp` prefix (see the
    # `rewrite` note on the /api/ location above for why this uses `rewrite`
    # instead of a trailing-slash proxy_pass).
    location /mcp/ {
        set $upstream_mcp http://mcp-gateway:8001;
        rewrite ^/mcp/(.*)$ /$1 break;
        proxy_pass $upstream_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caddyfile: `handle /_temporal*` — admin-gated Temporal Web UI (`temporal`
    # profile), basic-auth locked by default. Caddy's default is a dummy
    # bcrypt hash that accepts no credentials until TEMPORAL_UI_BASIC_AUTH is
    # set; the nginx equivalent is an htpasswd file that does not exist until
    # an operator creates one, so this route 401s for everyone out of the box
    # (fails closed the same way). Generate credentials with:
    #   htpasswd -c /etc/nginx/secrets/temporal.htpasswd admin
    location /_temporal {
        auth_basic "Forge Temporal UI";
        auth_basic_user_file /etc/nginx/secrets/temporal.htpasswd;
        set $upstream_temporal_ui http://temporal-ui:8080;
        proxy_pass $upstream_temporal_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caddyfile: `handle /grafana/*` (`observability` profile) — deliberately
    # `handle`, not `handle_path`: Grafana runs with
    # GF_SERVER_SERVE_FROM_SUB_PATH, so it must see the /grafana prefix; do
    # not strip it here either. Basic-auth locked by default, same pattern as
    # /_temporal above (in addition to Grafana's own admin login).
    location /grafana/ {
        auth_basic "Forge Grafana";
        auth_basic_user_file /etc/nginx/secrets/grafana.htpasswd;
        set $upstream_grafana http://grafana:3000;
        proxy_pass $upstream_grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caddyfile: `handle { reverse_proxy web:3000 }` — catch-all; must stay
    # last so every more-specific location above is tried first.
    location / {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
