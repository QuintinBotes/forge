{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "forge.serviceAccountName" . }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "rbac") | nindent 4 }}
  annotations:
    # Early hook (-10): the ServiceAccount must exist BEFORE the pre-install /
    # pre-upgrade migrate Job (-5) can schedule its pod (the Job sets
    # serviceAccountName). before-hook-creation keeps it in place for the app
    # pods afterwards — mirrors the ConfigMap/Secret hooks.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
# Least privilege: the app needs no Kubernetes API access, so no token is mounted
# and no Role/RoleBinding is created.
automountServiceAccountToken: false
{{- end }}
