apiVersion: v1
kind: Pod
metadata:
  name: {{ include "forge.fullname" . }}-test-connection
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "test") | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      securityContext:
        {{- toYaml .Values.containerSecurityContext | nindent 8 }}
      command:
        - sh
        - -c
        - >-
          curl -fsS http://{{ include "forge.fullname" . }}-api:{{ .Values.api.service.port }}/readyz
