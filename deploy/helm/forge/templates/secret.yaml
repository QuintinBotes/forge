{{- if .Values.secrets.create }}
{{- $data := .Values.secrets.data | default dict -}}
{{- /* Assemble the connection URLs that embed a password (Secret only). */ -}}
{{- $pgUser := "" -}}
{{- $pgDb := "" -}}
{{- $pgHost := include "forge.postgresHost" . -}}
{{- $pgPort := "5432" -}}
{{- if .Values.postgresql.enabled -}}
{{- $pgUser = .Values.postgresql.auth.username -}}
{{- $pgDb = .Values.postgresql.auth.database -}}
{{- else -}}
{{- $pgUser = .Values.externalDatabase.user -}}
{{- $pgDb = .Values.externalDatabase.database -}}
{{- $pgPort = .Values.externalDatabase.port | toString -}}
{{- end -}}
{{- $pgPass := get $data "POSTGRES_PASSWORD" | default "" -}}
{{- $dbUrl := printf "postgresql+psycopg://%s:%s@%s:%s/%s" $pgUser $pgPass $pgHost $pgPort $pgDb -}}
{{- $redisHost := include "forge.redisHost" . -}}
{{- $redisPort := "6379" -}}
{{- if not .Values.redis.enabled -}}
{{- $redisPort = .Values.externalRedis.port | toString -}}
{{- end -}}
{{- $redisPass := get $data "REDIS_PASSWORD" | default "" -}}
{{- $redisUrl := "" -}}
{{- if $redisPass -}}
{{- $redisUrl = printf "redis://:%s@%s:%s/0" $redisPass $redisHost $redisPort -}}
{{- else -}}
{{- $redisUrl = printf "redis://%s:%s/0" $redisHost $redisPort -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.secretName" . }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "config") | nindent 4 }}
  annotations:
    # Early hook (-10): present before the migrate Job (-5) and the app pods.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  # Assembled connection URLs (carry the password -> Secret, never ConfigMap).
  FORGE_DATABASE_URL: {{ $dbUrl | quote }}
  FORGE_REDIS_URL: {{ $redisUrl | quote }}
  {{- range $key, $val := $data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
