{{- if .Values.metrics.serviceMonitor.enabled }}
# Prometheus Operator ServiceMonitor (F38). Scrapes the api + mcp-gateway
# /metrics endpoints. Requires the Prometheus Operator CRDs in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "forge.fullname" . }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "metrics") | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
