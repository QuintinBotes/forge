{{- if .Values.ingress.enabled }}
{{- $fullName := include "forge.fullname" . -}}
{{- $apiPort := .Values.api.service.port -}}
{{- $webPort := .Values.web.service.port -}}
{{- if eq .Values.ingress.api "gateway" }}
# EXPERIMENTAL Gateway API renderer (ingress.api=gateway). Only the classic
# Ingress path below is CI-verified in V2 (see slice §12).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "ingress") | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.forge.domain | quote }}
  rules:
    - matches:
        - path: {type: PathPrefix, value: /api}
        - path: {type: PathPrefix, value: /healthz}
        - path: {type: PathPrefix, value: /readyz}
        - path: {type: PathPrefix, value: /integrations/github/webhook}
      backendRefs:
        - name: {{ $fullName }}-api
          port: {{ $apiPort }}
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: {{ $fullName }}-web
          port: {{ $webPort }}
{{- else }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "ingress") | nindent 4 }}
  annotations:
    # Preserve the GitHub webhook RAW body for HMAC verification (F03): never
    # buffer/rewrite the request body on these routes. No rewrite-target is set.
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # Generous read timeout for SSE run-trace streams + WebSocket pass-through.
    nginx.ingress.kubernetes.io/proxy-read-timeout: {{ .Values.ingress.sseReadTimeout | quote }}
    nginx.ingress.kubernetes.io/proxy-send-timeout: {{ .Values.ingress.sseReadTimeout | quote }}
    {{- if .Values.ingress.tls.enabled }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- end }}
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManager.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.forge.domain | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" $fullName) }}
  {{- end }}
  rules:
    - host: {{ .Values.forge.domain | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-api
                port:
                  number: {{ $apiPort }}
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-api
                port:
                  number: {{ $apiPort }}
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-api
                port:
                  number: {{ $apiPort }}
          - path: /integrations/github/webhook
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-api
                port:
                  number: {{ $apiPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: {{ $webPort }}
{{- end }}
{{- end }}
