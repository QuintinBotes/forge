{{- if .Values.migrations.enabled }}
# Pre-install / pre-upgrade hook: run the Alembic chain to completion BEFORE any
# app pod serves traffic. On upgrade, if this fails the workloads do not roll and
# the operator runs `helm rollback`. The shared ConfigMap/Secret are created as
# earlier-weighted (-10) hooks so they exist when this Job (-5) runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "forge.fullname" . }}-db-migrate
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "db-migrate") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        {{- include "forge.componentSelectorLabels" (dict "ctx" . "component" "db-migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "forge.serviceAccountName" . }}
      {{- include "forge.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          # The api image carries forge-cli.
          image: {{ include "forge.image" (dict "ctx" . "wl" .Values.api) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["forge-cli", "db", "migrate"]
          envFrom:
            {{- include "forge.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
