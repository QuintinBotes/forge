{{- if and .Values.web.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "forge.fullname" . }}-web
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "web") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "forge.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Only the ingress controller reaches web.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.web.service.port }}
{{- end }}
