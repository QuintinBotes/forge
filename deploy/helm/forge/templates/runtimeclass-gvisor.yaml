{{- /* F34 — gVisor RuntimeClass: the K8s analogue of a daemon.json `runtimes`
entry. Enable on clusters whose sandbox node pool has runsc installed. */ -}}
{{- if .Values.sandbox.runtimeClasses.gvisor.enabled }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.sandbox.runtimeClasses.gvisor.name }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "sandbox-runtime") | nindent 4 }}
handler: {{ .Values.sandbox.runtimeClasses.gvisor.handler }}
{{- with .Values.sandbox.runtimeClasses.gvisor.scheduling }}
scheduling:
  {{- with .nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
