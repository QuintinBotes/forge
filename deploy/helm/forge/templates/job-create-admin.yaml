{{- if .Values.createAdmin.enabled }}
# Post-install ONLY (never on upgrade): seed the first admin. Reads the password
# from the Secret via --password-stdin (never argv). Deleted on success.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "forge.fullname" . }}-create-admin
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "create-admin") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "forge.componentSelectorLabels" (dict "ctx" . "component" "create-admin") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "forge.serviceAccountName" . }}
      {{- include "forge.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: create-admin
          image: {{ include "forge.image" (dict "ctx" . "wl" .Values.api) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - sh
            - -c
            - >-
              printf '%s' "$ADMIN_PASSWORD" |
              forge-cli users create-admin --email {{ .Values.createAdmin.email | quote }} --password-stdin
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "forge.secretName" . }}
                  key: {{ .Values.createAdmin.passwordKey }}
          envFrom:
            {{- include "forge.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
