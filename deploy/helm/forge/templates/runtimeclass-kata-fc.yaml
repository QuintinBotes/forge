{{- /* F34 — Kata+Firecracker RuntimeClass. Enable on clusters whose sandbox
node pool runs kata-fc with /dev/kvm (bare metal or nested virtualization). */ -}}
{{- if .Values.sandbox.runtimeClasses.kataFc.enabled }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.sandbox.runtimeClasses.kataFc.name }}
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "sandbox-runtime") | nindent 4 }}
handler: {{ .Values.sandbox.runtimeClasses.kataFc.handler }}
{{- with .Values.sandbox.runtimeClasses.kataFc.scheduling }}
scheduling:
  {{- with .nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
