{{- if and .Values.mcpGateway.enabled .Values.mcpGateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "forge.fullname" . }}-mcp-gateway
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "mcp-gateway") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "forge.fullname" . }}-mcp-gateway
  minReplicas: {{ .Values.mcpGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.mcpGateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mcpGateway.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
