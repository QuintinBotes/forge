{{- if and .Values.mcpGateway.enabled .Values.mcpGateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "forge.fullname" . }}-mcp-gateway
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "mcp-gateway") | nindent 4 }}
spec:
  minAvailable: {{ .Values.mcpGateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "forge.componentSelectorLabels" (dict "ctx" . "component" "mcp-gateway") | nindent 6 }}
{{- end }}
