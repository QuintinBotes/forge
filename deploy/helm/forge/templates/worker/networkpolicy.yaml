{{- if and .Values.worker.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "forge.fullname" . }}-worker
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "forge.componentSelectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
  # The worker has no inbound Service, so no ingress is allowed (default-deny).
  # Egress is permitted to datastores, the api, the mcp-gateway, DNS and the
  # internet (model providers, GitHub, package registries for sandboxed runs).
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - {}
{{- end }}
