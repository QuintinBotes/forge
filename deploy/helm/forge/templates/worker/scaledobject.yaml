{{- /* KEDA Redis-list scaler — the correct signal for a Celery/Redis queue
       (the worker has no Service, so a CPU HPA cannot read queue depth). Requires
       the KEDA operator installed in the cluster. */ -}}
{{- if and .Values.worker.enabled .Values.worker.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "forge.fullname" . }}-worker
  labels:
    {{- include "forge.componentLabels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "forge.fullname" . }}-worker
  minReplicaCount: {{ .Values.worker.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.worker.keda.maxReplicaCount }}
  triggers:
    - type: redis
      metadata:
        address: {{ printf "%s:%s" (include "forge.redisHost" .) (.Values.redis.enabled | ternary "6379" (.Values.externalRedis.port | toString)) | quote }}
        listName: {{ .Values.worker.keda.listName | quote }}
        listLength: {{ .Values.worker.keda.lagThreshold | quote }}
        enableTLS: "false"
{{- end }}

