suite: secret/config separation + boot-critical fail-closed (AC9, AC21)
tests:
  - it: boot-critical keys live in the Secret, never the ConfigMap
    template: templates/secret.yaml
    asserts:
      - isNotNull:
          path: stringData.SECRET_KEY
      - isNotNull:
          path: stringData.AUTH_SECRET
      - isNotNull:
          path: stringData.FORGE_VAULT_KEYS
      - isNotNull:
          path: stringData.API_KEY_PEPPER
      - isNotNull:
          path: stringData.INTERNAL_SERVICE_TOKEN
      # NOTE: the BYOK model key (FORGE_MODEL_API_KEY) is NOT boot-critical — it is
      # optional (blank -> offline scripted model) so it is not asserted here.
      - isNotNull:
          path: stringData.FORGE_DATABASE_URL
      - isNull:
          path: stringData.FORGE_VAULT_ACTIVE_KEY_VERSION
  - it: the non-secret vault key VERSION lives in the ConfigMap, not the Secret
    template: templates/configmap-env.yaml
    asserts:
      - isNotNull:
          path: data.FORGE_VAULT_ACTIVE_KEY_VERSION
      - isNull:
          path: data.SECRET_KEY
      - isNull:
          path: data.FORGE_VAULT_KEYS
      - isNull:
          path: data.FORGE_DATABASE_URL
  - it: fails closed when secrets.create=false and existingSecret is empty
    template: templates/worker/deployment.yaml
    set:
      secrets.create: false
      secrets.existingSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "secrets.create is false: secrets.existingSecret must name an existing Secret"
  - it: fails closed when a boot-critical key is empty (F37)
    template: templates/configmap-env.yaml
    set:
      secrets.data.FORGE_VAULT_KEYS: ""
    asserts:
      - failedTemplate: {}
