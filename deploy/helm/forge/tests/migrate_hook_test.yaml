suite: migration hook ordering + command (AC12)
templates:
  - templates/job-migrate.yaml
tests:
  - it: is a pre-install/pre-upgrade hook with a negative weight
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-5"
  - it: runs forge-cli db migrate on the api image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["forge-cli", "db", "migrate"]
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "forge-api"
