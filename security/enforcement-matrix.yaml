# HARD-09 — the security enforcement matrix (source of truth).
#
# Every row is a FORGE_SPEC/threat-model security control asserted on the
# WIRED path (route -> dependency -> primitive) by the regression suite:
# tests/security/test_enforcement_matrix.py parametrizes over these rows and
# runs the check named by `check` (a callable in tests/security/matrix_checks.py).
# A control that is implemented but not mounted is therefore still a red test.
#
# mode: offline  -> runs hermetically (no creds, no DB, no network)
#       live-db  -> needs FORGE_TEST_DATABASE_URL (pgvector); skips cleanly otherwise
#
# The committed human-readable rendering is docs/security/evidence/enforcement-matrix.md
# (regenerated by scripts/security/gen_matrix_evidence.py; drift fails the suite).

controls:
  - id: rbac-default-deny
    title: RBAC role matrix is least-privilege / default-deny
    spec: 'FORGE_SPEC Security: "RBAC — admin, member, viewer, agent-runner roles per workspace"'
    mode: offline
    check: check_rbac_default_deny
    asserts: >
      Full cartesian product of UserRole x Permission against ROLE_PERMISSIONS:
      viewer=READ only; agent-runner=READ+RUN_AGENT only; member has no
      MANAGE_KEYS/MANAGE_SECRETS/MANAGE_MEMBERS/ADMIN; an unknown role gets the
      empty set; `ensure` raises PermissionDeniedError for every denied pair.

  - id: rbac-wired-403
    title: Wired routes return 403 for under-privileged roles
    spec: FORGE_SPEC Security (RBAC) / Task 2.3-fix-r2
    mode: offline
    check: check_rbac_wired_403
    asserts: >
      Through create_app() with an authenticated principal per role: viewer and
      agent-runner get 403 from a WRITE-gated route; member gets 403 from a
      MANAGE_KEYS-gated route; admin passes the same gates.

  - id: auth-required-401
    title: Every feature router rejects unauthenticated calls
    spec: FORGE_SPEC Security (auth wired)
    mode: offline
    check: check_auth_required_401
    asserts: >
      For every mounted feature router, every route (except the reviewed
      public-by-design set) returns 401/403/405/422-without-2xx when called
      with no credentials, and at least one route per router returns exactly 401.

  - id: mcp-write-default-deny
    title: MCP tools are read-only by default; writes fail closed
    spec: FORGE_SPEC MCP Security Rules #1
    mode: offline
    check: check_mcp_write_default_deny
    asserts: >
      is_write_tool classifies merge_pull_request/approve/un-annotated tools as
      writes; MCPClient.call_tool raises MCPWriteForbiddenError on a read-only
      connection (wired path with FakeTransport) and permits read_only=True tools.

  - id: policy-default-deny
    title: Repo policy evaluation is default-deny
    spec: FORGE_SPEC Repo Policy System
    mode: offline
    check: check_policy_default_deny
    asserts: >
      evaluate() returns DENY for an unlisted action, a write to a
      non-allowlisted path, a path-traversal write, and an empty tool call.

  - id: agent-policy-gate
    title: Agent dispatch never executes a policy-denied tool
    spec: FORGE_SPEC Security / Repo Policy System
    mode: offline
    check: check_agent_policy_gate
    asserts: >
      An AgentRunner driven by a scripted model requesting a denied tool records
      the DENY decision and the tool handler is never invoked.

  - id: redaction-sinks
    title: Secrets are redacted in audit, trace, and MCP snapshots
    spec: FORGE_SPEC Security ("secret redaction in logs")
    mode: offline
    check: check_redaction_sinks
    asserts: >
      Bearer tokens, api_key=... pairs, JWTs, and AWS AKIA keys survive in no
      sink: forge_api.observability.redaction (trace/log), the audit entry
      payload, and forge_mcp.security.redact (query-through snapshots).

  - id: ssrf-guard
    title: Outbound URL guard blocks metadata/loopback/private targets
    spec: OWASP A10:2021 / HARD-09 threat model
    mode: offline
    check: check_ssrf_guard
    asserts: >
      assert_safe_url rejects 169.254.169.254, 127.0.0.1, RFC1918, ::1, ULA,
      0.0.0.0, and file://; accepts a public IP and an allowlisted host; the
      forge_knowledge HTTP clients raise through the injected validator.

  - id: ratelimit-429
    title: Request rate limiting returns 429 + Retry-After
    spec: HARD-09 threat model (DoS)
    mode: offline
    check: check_ratelimit_429
    asserts: >
      Exceeding FORGE_RATELIMIT_BURST on a wired app returns 429 with a
      Retry-After header; /health stays exempt.

  - id: bodylimit-413
    title: Oversized request bodies are rejected with 413
    spec: HARD-09 threat model (resource exhaustion)
    mode: offline
    check: check_bodylimit_413
    asserts: >
      A body over FORGE_MAX_BODY_BYTES returns 413 on the wired app (declared
      Content-Length and the middleware's streamed-byte cap).

  - id: security-headers
    title: API responses carry the security header set
    spec: HARD-09 threat model (clickjacking / sniffing)
    mode: offline
    check: check_security_headers
    asserts: >
      Responses carry HSTS, X-Content-Type-Options: nosniff, X-Frame-Options:
      DENY, Referrer-Policy, and a deny-all CSP on JSON endpoints.

  - id: docs-lockdown-prod
    title: OpenAPI docs are disabled in production by default
    spec: HARD-09 threat model (information disclosure)
    mode: offline
    check: check_docs_lockdown_prod
    asserts: >
      With environment=production, /docs /redoc /openapi.json return 404 unless
      FORGE_DOCS_ENABLED is explicitly set.

  - id: principal-fails-safe
    title: Principal.role defaults to the least-privileged role
    spec: HARD-09 threat model (fail-open default)
    mode: offline
    check: check_principal_fails_safe
    asserts: >
      A default-constructed Principal has role=VIEWER with no write/admin/run
      permission.

  - id: vault-no-plaintext
    title: BYOK vault never exposes plaintext
    spec: FORGE_SPEC Security ("API keys encrypted at rest")
    mode: offline
    check: check_vault_no_plaintext
    asserts: >
      StoredSecret.ciphertext != plaintext; repr(StoredSecret) and SecretInfo
      carry no plaintext; a wrong-key decrypt raises InvalidTokenError.

  - id: tenant-isolation
    title: Vault reads are workspace-scoped
    spec: FORGE_SPEC Security ("per-workspace isolation")
    mode: offline
    check: check_tenant_isolation
    asserts: >
      A secret stored for workspace A is not readable or listable via
      workspace B (SecretNotFoundError; list returns no cross-tenant rows).

  - id: crypto-default-fernet
    title: The default cipher is Fernet (authenticated encryption)
    spec: HARD-10 handshake (asserted here as a regression pin)
    mode: offline
    check: check_crypto_default_fernet
    asserts: default_cipher() returns FernetCipher and round-trips.

  - id: secret-key-required-prod
    title: No silent ephemeral secret key outside development
    spec: HARD-10 handshake / SPEC-PRODUCTION-HARDENING creds rule 6
    mode: offline
    check: check_secret_key_required_prod
    asserts: >
      _resolve_master_key raises RuntimeError when FORGE_SECRET_KEY is unset
      and FORGE_ENVIRONMENT=production (no ephemeral fallback).

  - id: audit-tamper-evident
    title: The audit hash chain detects tampering; store is append-only
    spec: FORGE_SPEC Security ("audit log immutable")
    mode: offline
    check: check_audit_tamper_evident
    asserts: >
      Mutating any recorded entry breaks verify_chain/verify_integrity; the
      audit store API exposes no update/delete surface.

  - id: webhook-signature-fail-closed
    title: Webhook ingest rejects unsigned/forged deliveries
    spec: FORGE_SPEC Security (webhook verification)
    mode: offline
    check: check_webhook_signature_fail_closed
    asserts: >
      verify_github_signature rejects a missing/forged X-Hub-Signature-256 and
      accepts only the HMAC over the exact raw bytes (constant-time compare).

  - id: cors-lockdown
    title: CORS is deny-by-default; wildcard never pairs with credentials
    spec: Task 2.3-fix-r1 (regression pin)
    mode: offline
    check: check_cors_lockdown
    asserts: >
      Default Settings has no origins; a wildcard+credentials misconfiguration
      does not reflect arbitrary origins with credentials.

  - id: audit-immutability-trigger
    title: Postgres trigger rejects UPDATE/DELETE on audit_log
    spec: FORGE_SPEC Security ("audit log immutable") / migration 0022
    mode: live-db
    check: check_audit_immutability_trigger
    asserts: >
      On a live pgvector database, UPDATE and DELETE against the audit table
      raise (trigger audit_log_immutable); skips without FORGE_TEST_DATABASE_URL.

  - id: pg-vault-roundtrip
    title: DB-backed secret column round-trips under the real cipher
    spec: HARD-01/HARD-10 handshake
    mode: live-db
    check: check_pg_vault_roundtrip
    asserts: >
      An api_key.encrypted_secret row written through FernetCipher decrypts to
      the original plaintext on a live DB; ciphertext never equals plaintext;
      skips without FORGE_TEST_DATABASE_URL.
