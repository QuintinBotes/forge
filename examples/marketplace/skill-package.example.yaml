# Example forge-package.yaml for a skill profile (F32).
# Build with: forge marketplace package --kind skill_profile skill.yaml --out dist/
# then sign `manifest_hash` with your Ed25519 key and open a PR to a registry repo.
artifact:
  description: Backend feature development with strict TDD discipline
  forbidden_shortcuts:
  - skip_tests
  - no_error_handling
  - hardcoded_secrets
  min_test_coverage: 95
  name: backend-tdd-strict
  requires_plan: true
  requires_tests_before_implementation: true
  review_required: true
  schema_version: 1
  verification_steps:
  - lint
  - type_check
  - unit_tests
  - integration_tests
