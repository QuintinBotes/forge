# Example .forge/policy.yaml — Python data / ML pipeline repo.
#
# Pipelines read from many sources, so query_mcp is allowed for warehouse and
# catalog lookups, but production DAGs and credentials are write-denied and any
# data deletion is a restricted action.
repo_id: github.com/acme/analytics-pipelines
name: Analytics Pipelines
purpose: Batch and streaming data pipelines feeding the analytics warehouse.
languages: [python, sql]
entrypoints:
  - pipelines/dags/__init__.py
commands:
  install: uv sync
  lint: ruff check .
  type_check: mypy pipelines/
  test: pytest -q
  test_coverage: pytest --cov=pipelines --cov-report=term-missing -q
  build: docker build -t analytics-pipelines .
write_rules:
  allow: ["pipelines/**", "transformations/**", "tests/**", "docs/**", "sql/**"]
  deny:
    - "pipelines/prod/**"
    - "airflow/connections/**"
    - ".env*"
    - "secrets/**"
    - "*.pem"
    - "*.key"
    - "credentials*.json"
review_rules:
  required_reviewers: [team-data]
  approval_required_for_merge: true
  min_approvals: 1
deploy_rules:
  allow_agent_deploy: false
  environments: [dev]
  restricted_environments: [staging, production]
knowledge_rules:
  index_paths: ["pipelines/**", "transformations/**", "sql/**", "docs/**"]
  exclude_paths: [".venv/**", "__pycache__/**", "data/**", "*.parquet", "*.csv"]
  freshness_sla_hours: 24
skill_profiles:
  default: backend-tdd
  allowed: [backend-tdd, backend-fast, spec-analyst, security-review]
subagent_rules:
  allow_subagents: true
  allowed_roles: [reviewer, tester]
  max_parallel: 2
allowed_actions: [read_repo, write_code, run_tests, open_pr, read_knowledge, query_mcp]
restricted_actions:
  - deploy_prod
  - delete_data
  - delete_files
  - push_to_main
  - modify_access_controls
